        '403':
          description: Insufficient permissions. Super Admin access role is required.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  headers:
    X-Next:
      description: A link to the next page of responses
      schema:
        type: string
        format: url
        example: https://api.leapsome.com/v1/goals?cursor=58d55e3ffdc2eb20547edd0a&limit=100
  parameters:
    cursorParam:
      name: cursor
      in: query
      required: false
      description: 'Start showing results from this location. Typically, you do not

        need to set this parameter manually, it is mainly used in

        "x-next" header

        '
      schema:
        type: string
        pattern: ^[0-9a-f]{24}$
    limitParam:
      name: limit
      in: query
      description: Maximal number of results in a response
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
  schemas:
    AuthInfo:
      type: object
      required:
      - token
      - expiresIn
      properties:
        token:
          type: string
          example: <JWT TOKEN>
        expiresIn:
          type: integer
          description: seconds until the token expires
          example: 18000
    PaginatedGoals:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Goal'
    Meta:
      type: object
      required:
      - count
      - cursor
      - nextPage
      properties:
        count:
          type: integer
          description: number of results returned in this request
          minimum: 1
          maximum: 1000
        cursor:
          type: string
          description: 'Will be set to `null` if complete set have been returned.

            '
          pattern: ^[0-9a-f]{24}$
          example: 58d55e3ffdc2eb20547edd0a
          nullable: true
        nextPage:
          type: string
          format: url
          description: URL of the next result page. `null` means no more results available.
          nullable: true
    User:
      type: object
      required:
      - id
      - email
      - fullName
      properties:
        id:
          type: string
          pattern: ^[0-9a-f]{24}$
          example: 58d55e3ffdc2eb20547edd0a
        email:
          type: string
          format: email
          example: example@example.com
        fullName:
          type: string
          example: John Doe
        preferredName:
          type: string
          example: John von Doe (Full name)
    Comments:
      type: object
      required:
      - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
    Comment:
      type: object
      required:
      - id
      - content
      - sender
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
        content:
          type: string
          description: The comment body which can contain html tags
        sender:
          type: object
          required:
          - id
          - firstname
          - lastname
          - picture
          properties:
            id:
              type: string
            firstname:
              type: string
            lastname:
              type: string
            picture:
              type: string
              format: url
        createdAt:
          type: string
          format: date-time
          example: '2019-08-23T11:53:06.741Z'
        updatedAt:
          type: string
          format: date-time
          example: '2019-08-23T11:53:06.741Z'
    Goal:
      type: object
      required:
      - id
      - type
      - name
      - description
      - contributors
      - progress
      - status
      - managedBy
      - tags
      - deadline
      - keyResults
      - parent
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          pattern: ^[0-9a-f]{24}$
          example: 5b237f6868794d5c08555812
        type:
          type: string
          enum:
          - user
          - team
          - company
          example: user
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          - nullable: true
            description: 'Information about the user, who''s assigned to this goal.

              Will be `null` for Team and Company goals.

              '
        team:
          type: object
          nullable: true
          description: 'Information about the team, that''s assigned to this goal.

            Will be `null` for User and Company goals.

            '
          properties:
            id:
              type: string
              pattern: ^[0-9a-f]{24}$
              example: 5b237f6868794d5c08555812
            name:
              type: string
              example: Rocket Scientists
        name:
          type: string
          example: Become a great place to work (d)
        description:
          type: string
          example: Make it entertaining
        contributors:
          type: array
          items:
            $ref: '#/components/schemas/User'
        progress:
          type: integer
          minimum: 0
          maximum: 100
          example: 50
        status:
          type: string
          enum:
          - archived
          - live
          - draft
          - removed
          example: live
        managedBy:
          $ref: '#/components/schemas/User'
        tags:
          type: array
          items:
            type: object
            required:
            - id
            - name
            properties:
              id:
                type: string
                pattern: ^[0-9a-f]{24}$
                example: 5b237f6868794d5c08555812
              name:
                type: string
        deadline:
          type: string
          format: date-time
          nullable: true
        keyResults:
          type: array
          items:
            $ref: '#/components/schemas/KeyResults'
        parent:
          $ref: '#/components/schemas/ParentGoal'
        progressStatus:
          type: string
          enum:
          - onTrack
          - offTrack
          - inputNeeded
          - done
          - canceled
          nullable: true
        createdAt:
          type: string
          format: date-time
          example: '2019-08-23T11:53:06.741Z'
        updatedAt:
          type: string
          format: date-time
          example: '2019-08-23T11:53:06.741Z'
    KeyResults:
      type: object
      required:
      - id
      - name
      - metric
      - weight
      - ownerTeam
      - ownerUser
      - contributors
      - contributorTeams
      properties:
        id:
          type: string
          pattern: ^[0-9a-f]{24}$
          example: 5b237f6868794d5c08555812
        name:
          type: string
          example: Bring Glassdoor score up above 4
        metric:
          type: object
          required:
          - type
          - start
          - end
          - current
          properties:
            type:
              type: string
              example: currency
              enum:
              - none
              - numerical
              - percentage
              - currency
            start:
              type: integer
            end:
              type: integer
            current:
              type: integer
        weight:
          type: integer
          minimum: 0
          maximum: 100
          example: 30
        ownerUser:
          $ref: '#/components/schemas/User'
        ownerTeam:
          type: object
          properties:
            id:
              type: string
              pattern: ^[0-9a-f]{24}$
              example: 5b237f6868794d5c08555812
            name:
              type: string
              example: Engineer
        contributors:
          type: array
          items:
            $ref: '#/components/schemas/User'
        contributorTeams:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                pattern: ^[0-9a-f]{24}$
                example: 5b237f6868794d5c08555812
              name:
                type: string
                example: Engineer
    Tags:
      type: array
      items:
        $ref: '#/components/schemas/Tag'
    Tag:
      type: object
      required:
      - id
      - name
      - status
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          pattern: ^[0-9a-f]{24}$
          example: 5b237f6868794d5c08555812
        name:
          type: string
          example: Marketing
        status:
          type: string
          enum:
          - active
          - viewOnly
          - removed
        createdAt:
          type: string
          format: date-time
          example: '2019-08-23T11:53:06.741Z'
        updatedAt:
          type: string
          format: date-time
          example: '2019-08-23T11:53:06.741Z'
    KeyResultUpdate:
      type: object
      properties:
        name:
          type: string
          example: Bring Glassdoor score up above 4
        metric:
          type: object
          required:
          - type
          - start
          - end
          - current
          properties:
            type:
              type: string
              enum:
              - none
              - numerical
              - percentage
              - currency
            start:
              type: integer
            end:
              type: integer
            current:
              type: integer
        weight:
          type: integer
          minimum: 0
          maximum: 100
    InitiativeUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
          - notStarted
          - inProgress
          - completed
          - blocked
    ParentGoal:
      type: object
      nullable: true
      properties:
        _id:
          type: string
          pattern: ^[0-9a-f]{24}$
          example: 5cb0855f0f089e6924b742e4
        name:
          type: string
          example: Enhance Employee Experience and Retention
        status:
          type: string
          enum:
          - live
          - draft
          - archived
          example: live
    Absence:
      type: object
      required:
      - _id
      - createdAt
      - updatedAt
      - userId
      - start
      - end
      - absenceType
      - activityType
      - status
      - timeUnit
      properties:
        _id:
          type: string
          pattern: ^[0-9a-f]{24}$
          example: 66a1b2c3d4e5f6789012345a
          description: Unique identifier for the absence
        createdAt:
          type: string
          format: date-time
          example: '2024-01-15T08:30:00.000Z'
          description: When the absence was created
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-15T08:30:00.000Z'
          description: When the absence was last modified
        userId:
          type: string
          pattern: ^[0-9a-f]{24}$
          example: 58d55e3ffdc2eb20547edd0a
          description: ID of the user taking the absence
        start:
          type: string
          format: date-time
          example: '2024-02-01T00:00:00.000Z'
          description: Start date and time of the absence
        startDayTime:
          type: string
          example: 09:00
          description: Start time of the absence (HH:mm format)
        startDayDuration:
          type: string
          enum:
          - fullDay
          - halfDayMorning
          - halfDayAfternoon
          example: fullDay
          description: Duration type for the start day of the absence
        end:
          type: string
          format: date-time
          example: '2024-02-05T23:59:59.999Z'
          description: End date and time of the absence
        endDayTime:
          type: string
          example: '17:00'
          description: End time of the absence (HH:mm format)
        endDayDuration:
          type: string
          enum:
          - fullDay
          - halfDayMorning
          - halfDayAfternoon
          example: fullDay
          description: Duration type for the end day of the absence
        absenceType:
          type: string
          enum:
          - paidVacation
          - sickLeave
          - parentalLeave
          - unpaidVacation
          - familyCare
          - childCare
          - shortTermAllowance
          - quarantine
          - lockout
          - irrevocableExemption
          - voluntaryMilitaryService
          - unlawfulStrike
          - lawfulStrike
          - unexcusedAbsence
          - remoteWork
          - otherPaidLeave
          - educationalLeave
          - gardenLeave
          - longtermSickLeave
          example: paidVacation
          description: Type of absence being taken
        activityType:
          type: string
          enum:
          - nonWorkingPaid
          - nonWorkingUnpaid
          - working
          - nonWorkingPartiallyPaid
          example: nonWorkingPaid
          description: Activity type classification of the absence
        status:
          type: string
          enum:
          - active
          - removed
          - pendingRemoval
          example: active
          description: Current status of the absence
        timeUnit:
          type: string
          enum:
          - days
          - hours
          example: days
          description: Unit of time used for measuring the absence duration
        comment:
          type: string
          example: Medical appointment
          description: Optional comment or note about the absence
        actualAbsenceDuration:
          type: number
          nullable: true
          example: 5
          description: Actual duration of the absence in the specified time unit
