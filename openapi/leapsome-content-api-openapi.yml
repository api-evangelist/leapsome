        name:
          type: string
          example: Q1 2024 Payroll
          description: Name of the payroll cycle
        status:
          type: string
          enum:
          - open
          - pendingApproval
          - approved
          - overdue
          - future
          - reopened
          example: open
          description: Current status of the payroll cycle
        startAt:
          type: string
          format: date-time
          description: Start date of the payroll period
        endAt:
          type: string
          format: date-time
          description: End date of the payroll period
        customPeriodStartAt:
          type: string
          format: date-time
          description: Start date of the custom period
        customPeriodEndAt:
          type: string
          format: date-time
          description: End date of the custom period
        reviewStartAt:
          type: string
          format: date-time
          description: Start date of the review period
        approvalStartAt:
          type: string
          format: date-time
          description: Start date of the approval period
        approvedAt:
          type: string
          format: date-time
          description: Date when the payroll cycle was approved
        approvedBy:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: User ID of the user who approved the payroll cycle
        prorateType:
          type: string
          enum:
          - weekly
          - biWeekly
          - semiMonthly
          - thirtyDays
          - actualNumberOfMonthDays
          example: weekly
          description: Type of prorate used for the payroll cycle
        compensations:
          type: object
          properties:
            salaryTypeCustomName:
              type: string
              description: Custom name for the salary type
            baseSalaryCustomName:
              type: string
              description: Custom name for the base salary
            salaryPerHourCustomName:
              type: string
              description: Custom name for the salary per hour
            compensableTimeCustomName:
              type: string
              description: Custom name for the compensable time
            hoursWorkedCustomName:
              type: string
              description: Custom name for the hours worked
            paidAbsencesCustomName:
              type: string
              description: Custom name for the paid absences
        createdAt:
          type: string
          format: date-time
          description: When the payroll cycle was created
        updatedAt:
          type: string
          format: date-time
          description: When the payroll cycle was last updated
    PayrollCycleParticipantList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PayrollCycleParticipant'
        meta:
          type: object
          properties:
            page:
              type: integer
              description: Current page number
            pageSize:
              type: integer
              description: Number of items per page
            totalCount:
              type: integer
              description: Total number of participants
    PayrollCycleParticipant:
      type: object
      properties:
        id:
          type: string
          pattern: ^[0-9a-f]{24}$
          example: 58d55e3ffdc2eb20547edd0a
          description: Payroll cycle participant ID
        name:
          type: string
          example: John Doe
          description: Name of the participant
        email:
          type: string
          format: email
          example: jane.doe@example.com
          description: Email address of the participant
        compensations:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: Name of the compensation
              amount:
                type: number
                description: Amount of the compensation
              amountType:
                type: string
                enum:
                - fixed
                - variable
                description: Type of the compensation
              recurrence:
                type: string
                enum:
                - monthly
                - every3Months
                - every6Months
                - every12Months
                description: Recurrence of the compensation
              comment:
                type: string
                description: Comment for the compensation
              effectiveAt:
                type: string
                format: date-time
                description: Effective date of the compensation
              validUntil:
                type: string
                format: date-time
                description: Valid until date of the compensation
        salaryInfoPeriods:
          type: array
          items:
            type: object
            properties:
              currency:
                type: string
              salary:
                type: number
                description: Salary for the period
              salaryRemunerationPeriod:
                type: string
                enum:
                - year
                - month
                - hour
                description: Remuneration period of the salary
              compensationType:
                type: string
                enum:
                - fixed
                - hourly
                description: Type of the compensation
              baseSalary:
                type: number
                description: Base salary for the period
        isActiveParticipant:
          type: boolean
          description: Whether the participant is active in the payroll cycle
    FeedbackList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FeedbackItem'
        meta:
          type: object
          properties:
            offset:
              type: integer
              description: Number of results skipped
            limit:
              type: integer
              description: Maximum number of results returned
            totalCount:
              type: integer
              description: Total number of feedback items
    FeedbackItem:
      type: object
      properties:
        id:
          type: string
          pattern: ^[0-9a-f]{24}$
          example: 58d55e3ffdc2eb20547edd0a
          description: Feedback item ID
        type:
          type: string
          enum:
          - praise
          - instantFeedback
          description: Type of feedback
        sender:
          type: object
          nullable: true
          properties:
            id:
              type: string
              pattern: ^[0-9a-f]{24}$
              nullable: true
              description: Sender user ID (null if anonymous)
            name:
              type: string
              description: Sender display name ("Anonymous" if anonymous)
          description: The user who sent the feedback
        receivers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                pattern: ^[0-9a-f]{24}$
                description: Receiver user or team ID
              name:
                type: string
                description: Receiver display name
          description: Users or teams who received the feedback
        message:
          type: string
          nullable: true
          description: The feedback message content
        badge:
          type: object
          nullable: true
          properties:
            name:
              type: string
              description: Badge name
            icon:
              type: string
              description: Badge icon path
          description: Badge attached to the feedback (praise only)
        visibility:
          type: string
          enum:
          - public
          - receiver
          - senderOnly
          description: Visibility level of the feedback
        createdAt:
          type: string
          format: date-time
          description: When the feedback was created
        likesCount:
          type: integer
          description: Number of likes on the feedback
        commentsCount:
          type: integer
          description: Number of comments on the feedback
    CreatePraiseRequest:
      type: object
      required:
      - senderId
      - receiverIds
      - message
      properties:
        senderId:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: User ID of the sender
        receiverIds:
          type: array
          items:
            type: string
            pattern: ^[0-9a-f]{24}$
          minItems: 1
          description: User IDs of the praise receivers
        message:
          type: string
          minLength: 1
          description: The praise message content
        visibility:
          type: string
          enum:
          - public
          - receiver
          default: public
          description: Visibility level of the praise
    CreatePraiseResponse:
      type: object
      properties:
        id:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: ID of the created feedback item
    CreateInstantFeedbackRequest:
      type: object
      required:
      - senderId
      - receiverId
      - message
      properties:
        senderId:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: User ID of the sender
        receiverId:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: User ID of the feedback receiver
        message:
          type: string
          minLength: 1
          description: The feedback message content
        visibility:
          type: string
          enum:
          - public
          - receiver
          - manager
          - senderOnly
          default: receiver
          description: Visibility level of the feedback
    CreatePrivateNoteRequest:
      type: object
      required:
      - senderId
      - receiverId
      - message
      properties:
        senderId:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: User ID of the sender
        receiverId:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: User ID the private note is about
        message:
          type: string
          minLength: 1
          description: The private note content
    CreateFeedbackResponse:
      type: object
      properties:
        id:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: ID of the created feedback item
    UploadUserDocumentRequest:
      type: object
      required:
      - file
      - category
      properties:
        file:
          type: string
          format: binary
          description: The document file to upload (max 25 MB)
        category:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: ID of the user document category (from GET /documents/categories)
          example: 58d55e3ffdc2eb20547edd0a
        description:
          type: string
          description: Optional human-readable description for the document
          example: Annual performance review for 2024
    UploadUserDocumentResponse:
      type: object
      properties:
        id:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: ID of the uploaded document
          example: 58d55e3ffdc2eb20547edd0a
    DocumentCategory:
      type: object
      properties:
        id:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: Category ID. Use this value as the `category` field when uploading documents.
          example: 58d55e3ffdc2eb20547edd0a
        name:
          type: string
          description: Display name of the category
          example: Past Reviews
    PublicAccessRole:
      type: object
      properties:
        id:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: Access role ID
        name:
          type: string
          description: Display name of the access role
        userScopeType:
          type: string
          enum:
          - none
          - roleSpecific
          - userSpecific
          description: How user scope is determined for this role
        isSystemDefault:
          type: boolean
          description: Whether this is a built-in system role
        systemDefaultType:
          type: string
          description: System default role identifier when `isSystemDefault` is true
        active:
          type: boolean
          description: Whether the role is active
    UpdateEmployeeAccessRolesRequest:
      type: object
      required:
      - accessRoleIds
      properties:
        accessRoleIds:
          type: array
          items:
            type: string
            pattern: ^[0-9a-f]{24}$
          description: Full desired set of secondary access role IDs for the employee. Primary access role IDs are not allowed.
        accessRoleCustomConfigurations:
          type: array
          description: User-specific scope configurations for access roles with `userScopeType` set to `userSpecific`. Only
            `include.users` is supported.
          items:
            $ref: '#/components/schemas/PublicUserAccessRoleCustomConfiguration'
    UpdateEmployeeAccessRolesResponse:
      type: object
      properties:
        userId:
          type: string
          pattern: ^[0-9a-f]{24}$
        accessRoleIds:
          type: array
          items:
            type: string
            pattern: ^[0-9a-f]{24}$
        accessRoleCustomConfigurations:
          type: array
          items:
            $ref: '#/components/schemas/PublicUserAccessRoleCustomConfiguration'
    PublicUserAccessRoleCustomConfiguration:
      type: object
      required:
      - accessRole
      - userSpecificAccessScope
      additionalProperties: false
      properties:
        accessRole:
          type: string
          pattern: ^[0-9a-f]{24}$
          description: Access role ID this custom user scope belongs to
        userSpecificAccessScope:
          $ref: '#/components/schemas/PublicUserSpecificAccessScope'
    PublicUserSpecificAccessScope:
      type: object
      required:
      - include
      additionalProperties: false
      properties:
        include:
          type: object
          required:
          - users
          additionalProperties: false
          properties:
            users:
              type: array
              minItems: 1
              items:
                type: string
                pattern: ^[0-9a-f]{24}$
              description: User IDs the target employee may access when using this role
