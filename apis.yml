- aid: leapsome:leapsome-scim-api
  name: Leapsome SCIM API
  description: The Leapsome SCIM 2.0 API enables automated user provisioning and lifecycle
    management, supporting creation, update, deactivation, and deletion of users and
    groups. It integrates with enterprise identity providers such as Okta, Azure Active
    Directory, OneLogin, and any SCIM-compatible IdP. The API supports pagination,
    partial updates via PATCH, and recommends soft-deactivation over hard delete to
    preserve historical performance data. SCIM provisioning requires the Enterprise
    plan.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
