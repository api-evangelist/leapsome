aid: leapsome
name: Leapsome
description: Leapsome is an AI-powered people enablement platform that combines HRIS,
  talent management, and HR automation into a single modular solution used by more
  than 2,000 organizations worldwide. The platform covers the full employee lifecycle
  including performance reviews, OKRs and goal management, engagement surveys, 1:1
  meetings, instant feedback, learning pathways, and compensation management. Leapsome
  exposes a REST Content API for extracting reviews, goals, employee attributes, payroll,
  and time-tracking data, plus a SCIM 2.0 API for automated user provisioning and
  lifecycle management with enterprise identity providers. Both APIs authenticate
  via bearer tokens generated inside the platform settings and are documented through
  Swagger UI at api.leapsome.com.
