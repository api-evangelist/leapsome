apis:
- aid: leapsome:leapsome-content-api
  name: Leapsome Content API
  description: The Leapsome Content API provides read access to performance review
    data, OKRs and goal progress, employee attributes, payroll information, and time
    tracking records. It enables one-way extraction of Leapsome data into external
    analytics tools, data warehouses, and custom integrations. Access is authenticated
    via a bearer token generated in Settings > Integrations and imports > Content
    API.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://help.leapsome.com/hc/en-us/articles/9251417820061-Content-API-Access-Reviews-Goals
  baseURL: https://api.leapsome.com/v1
